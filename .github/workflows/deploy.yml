name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # - name: Build source code (2 folders)
      #   run: |
      #     # 1) Root build (baseUrl '/') -> ./build  (serves blog.dbdiagram.io/*)
      #     npm run build

      #     # 2) Path build (baseUrl '/blog/') -> temp dir
      #     BLOG_BASE_URL=/blog/ npm run build -- --out-dir build-blog-tmp

      #     # 3) Merge the /blog/ build into the same artifact under build/blog/
      #     #    (no overwrites: root build/blog holds only static images;
      #     #     the /blog/ build adds pages/assets alongside them)
      #     mkdir -p build/blog
      #     cp -R build-blog-tmp/. build/blog/
      #     rm -rf build-blog-tmp

      - name: Build source code (base path /blog/)
        run: |
          BLOG_BASE_URL=/blog/ npm run build

          # build/ is flat (build/assets/...), but the site is built for /blog/.
          # The custom domain serves the artifact at the root, so nest the build
          # under blog/ to make /blog/... resolve, and redirect the bare root.
          mkdir -p _site/blog
          cp -r build/. _site/blog/
          echo '<!doctype html><meta http-equiv="refresh" content="0; url=/blog/">' > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
